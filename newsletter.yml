name: Ethiopia Political Brief

on:
  schedule:
    # Runs every day at 07:00 UTC (08:00 Oslo time, 10:00 Addis time)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allows you to run it manually from GitHub

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate and send newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python ethiopia_brief.py
